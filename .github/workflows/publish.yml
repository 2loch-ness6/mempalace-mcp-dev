name: Build & Test (npm publish disabled)

on:
  release:
    types: [published]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # Publish step disabled — this package is not distributed via npm.
    # To publish in the future, add an NPM_TOKEN secret and uncomment the publish step.

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Publish disabled — this package is not on npm.
      # - name: Publish
      #   run: npm publish --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
